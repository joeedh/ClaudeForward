<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ClaudeForward — login</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <h1>ClaudeForward</h1>
      <p class="muted">Enter the bearer token printed by the daemon on first run.</p>
      <form id="login-form">
        <label>
          Token
          <input type="password" id="token" name="token" autocomplete="off" autofocus required />
        </label>
        <button type="submit">Sign in</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </main>
    <script type="module" src="/static/login.js"></script>
  </body>
</html>
